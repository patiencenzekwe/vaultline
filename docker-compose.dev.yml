services:
  postgres:
    image: postgres:18-alpine
    container_name: vaultline-db
    environment:
      POSTGRES_DB: vaultline
      POSTGRES_USER: vaultline_user
      POSTGRES_PASSWORD: vaultline_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vaultline_user -d vaultline" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
